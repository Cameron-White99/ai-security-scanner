name: Deploy

on:
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker us-central1-docker.pkg.dev

      - name: Build and push image
        run: |
          docker build -t us-central1-docker.pkg.dev/ai-security-scanner-499001/ai-security-scanner/api:latest .
          docker push us-central1-docker.pkg.dev/ai-security-scanner-499001/ai-security-scanner/api:latest

      - uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ai-security-scanner-api
          image: us-central1-docker.pkg.dev/ai-security-scanner-499001/ai-security-scanner/api:latest
          region: us-central1
